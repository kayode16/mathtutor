<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Request Received | Emivant</title>
  <meta name="robots" content="noindex">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Arial,Helvetica,sans-serif;
      color:#172033;
      background:linear-gradient(135deg,#eef3f9,#ffffff);
    }
    .card{
      width:min(650px,100%);
      padding:46px 34px;
      border:1px solid #dce5f0;
      border-radius:24px;
      background:#fff;
      box-shadow:0 20px 55px rgba(15,61,145,.12);
      text-align:center;
    }
    .icon{
      width:72px;height:72px;
      display:grid;place-items:center;
      margin:0 auto 20px;
      border-radius:50%;
      background:#e6f7f1;
      color:#0f766e;
      font-size:2rem;
      font-weight:900;
    }
    h1{color:#0f3d91;line-height:1.1}
    p{color:#5f6f86;line-height:1.7}
    a{
      display:inline-block;
      margin-top:15px;
      padding:13px 22px;
      border-radius:999px;
      background:#f4b400;
      color:#08203a;
      text-decoration:none;
      font-weight:900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Your Assessment Request Has Been Received</h1>
    <p>Thank you. Emivant Online Mathematics Tutor will review your information and contact you using the details you submitted.</p>
    <a href="/">Return to the website</a>
  </main>
</body>
</html>
