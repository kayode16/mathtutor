  <script>
    const EMIVANT_META_PIXEL_ID = '1032810242576149';

    function loadMetaPixelAndLead() {
      if (!window.fbq) {
        !function(f,b,e,v,n,t,s) {
          if (f.fbq) return;
          n = f.fbq = function() {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = true;
          n.version = '2.0';
          n.queue = [];
          t = b.createElement(e);
          t.async = true;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', EMIVANT_META_PIXEL_ID);
        fbq('track', 'PageView');
      }

      if (!sessionStorage.getItem('emivant_lead_recorded')) {
        fbq('track', 'Lead', { source: 'free_assessment_form' });
        gtag('event', 'generate_lead', {
          form_name: 'free-mathematics-assessment'
        });
        sessionStorage.setItem('emivant_lead_recorded', 'true');
      }
    }

    const savedConsent = localStorage.getItem('emivant_cookie_consent');
    if (savedConsent === 'accepted') {
      gtag('consent', 'update', {
        analytics_storage: 'granted',
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
      });
      loadMetaPixelAndLead();
    }
  </script>
